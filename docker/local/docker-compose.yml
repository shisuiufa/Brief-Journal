name: brief_journal

services:
  postgres:
    image: postgres:16
    container_name: brief_journal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brief_journal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - brief_journal_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: brief_journal_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8081:80"
    depends_on:
      - postgres
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - brief_journal_pgadmin_data:/var/lib/pgadmin

  api:
    build:
      context: ../../api
      dockerfile: ../docker/local/api/Dockerfile
    container_name: brief_journal_api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../../api:/var/www
    depends_on:
      - postgres
    ports:
      - "9000:9000"

  nginx:
    image: nginx:alpine
    container_name: brief_journal_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../../api:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  web:
    build:
      context: ../../web
      dockerfile: ../docker/local/web/Dockerfile
    container_name: brief_journal_web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  brief_journal_postgres_data:
  brief_journal_pgadmin_data:
